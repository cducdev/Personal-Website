upstream ducdev_io_vn {
	server 127.0.0.1:4321;
	keepalive 32;
}

server {
	listen 80;
	listen [::]:80;
	server_name ducdev.io.vn www.ducdev.io.vn;

	return 301 https://ducdev.io.vn$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name ducdev.io.vn;

	ssl_certificate /etc/letsencrypt/live/ducdev.io.vn/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/ducdev.io.vn/privkey.pem;
	client_max_body_size 10m;

	location / {
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Connection "";
		proxy_pass http://ducdev_io_vn;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name www.ducdev.io.vn;

	ssl_certificate /etc/letsencrypt/live/ducdev.io.vn/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/ducdev.io.vn/privkey.pem;

	return 301 https://ducdev.io.vn$request_uri;
}
